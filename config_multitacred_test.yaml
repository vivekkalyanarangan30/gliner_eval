general:
  sample_size: 5
  random_seed: 42
  output_dir: outputs_multitacred_run
  matching_mode: strict

datasets:
  docred:
    enabled: false
  crossre:
    enabled: false
  fewrel:
    enabled: false
  multitacred:
    enabled: true
    data_dir: data/multitacred
    language: en
    split: test

models:
  gliner:
    enabled: true
    model_id: knowledgator/gliner-relex-large-v0.5
    entity_threshold: 0.3
    relation_threshold: 0.5
    batch_size: 1
  gliner2:
    enabled: true
    model_id: fastino/gliner2-large-v1
    relation_threshold: 0.5
  gpt5:
    enabled: true
    model_name: gpt-5
    temperature: 0.0
    max_tokens: 16384
  qwen3:
    enabled: false
